<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escola Estadual 2 de Setembro - Sistema de Votação</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-content">
                <div class="logo-container">
                    <img src="assets/logo_escola.jpg" alt="Logo Escola Estadual 2 de Setembro" class="logo-escola">
                </div>
                <div class="header-text">
                    <h1>Escola Estadual 2 de Setembro</h1>
                    <p class="subtitle">Sistema de Escolha de Professor Tutor</p>
                </div>
            </div>
            
            <div class="header-tabs">
                <button class="tab-button active" onclick="mostrarAba('votacao')">
                    <i class="fas fa-vote-yea"></i> Votação
                </button>
                <button class="tab-button" onclick="mostrarAba('relatorio')">
                    <i class="fas fa-chart-bar"></i> Relatório de Tutorandos
                </button>
            </div>
        </header>

        <!-- ABA DE VOTAÇÃO -->
        <div id="abaVotacao" class="tab-content active">
            <div class="aluno-info" id="alunoInfo">
                <h2>Identificação do Aluno</h2>
                <div class="aluno-form">
                    <div class="input-group">
                        <label for="alunoNome">Nome Completo:</label>
                        <input type="text" id="alunoNome" placeholder="Digite seu nome completo" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="turmaSelect">Série:</label>
                        <select id="turmaSelect" required>
                            <option value="">Selecione sua série</option>
                        </select>
                    </div>
                    
                    <button onclick="identificarAluno()" id="btnIdentificar">Identificar-se</button>
                </div>
            </div>

            <div class="votacao-container" id="votacaoContainer" style="display: none;">
                <div class="aluno-saudacao">
                    <div>
                        <h3>Olá, <span id="alunoNomeDisplay"></span>!</h3>
                        <p>Série: <span id="alunoTurmaDisplay"></span></p>
                    </div>
                    <button onclick="sair()" class="btn-sair">Sair</button>
                </div>

                <div class="professores-grid" id="professoresGrid">
                </div>

                <div class="info-rodape">
                    <p>⚠️ Cada professor pode ter no máximo 10 tutorandos. Após atingir o limite, ficará indisponível.</p>
                </div>
            </div>
        </div>

        <!-- ABA DE RELATÓRIO -->
        <div id="abaRelatorio" class="tab-content">
            <div class="relatorio-header">
                <h2><i class="fas fa-chart-bar"></i> Relatório de Tutorandos por Professor</h2>
                
                <div class="estatisticas-grid" id="estatisticasContainer">
                </div>

                <div class="pesquisa-container">
                    <div class="input-group pesquisa-group">
                        <label for="pesquisaRelatorio">
                            <i class="fas fa-search"></i> Pesquisar:
                        </label>
                        <input 
                            type="text" 
                            id="pesquisaRelatorio" 
                            placeholder="Digite nome do professor ou aluno..."
                            onkeyup="filtrarRelatorio()"
                        >
                    </div>
                    <button onclick="limparPesquisa()" class="btn-limpar">
                        <i class="fas fa-times"></i> Limpar
                    </button>
                    <button onclick="carregarRelatorio()" class="btn-atualizar">
                        <i class="fas fa-sync-alt"></i> Atualizar
                    </button>
                </div>
            </div>

            <div class="relatorio-container" id="relatorioContainer">
                <div class="loading">Carregando relatório...</div>
            </div>
        </div>
    </div>

    <div id="modal" class="modal" style="display: none;">
        <div class="modal-content">
            <span class="close" onclick="fecharModal()">&times;</span>
            <div id="modalMessage"></div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
